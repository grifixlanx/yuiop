<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

        /* Custom error messge  */
        .error-msg {
            color: #dc3545;
            font-size: 0.875em;
            margin-top: 0.25rem;
            font-weight: bold;
        }
        .success-banner {
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
            padding: 1rem;
            border-radius: 0.375rem;
            margin-top: 1rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

   <!-- Milestone 2 Navbar with Dropdown Feature -->

            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

                <li class="nav-item"><a class="nav-link" href="periods.html">Periods of Rome</a></li>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header card-header-roman py-3">
                        <h3 class="card-title mb-0 text-center fw-bold text-white">Inquiries & Feedback</h3>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-center text-muted">Have a historical insight? Send us a message.</p>
                        
                        <form id="registrationForm">
                            <div class="mb-3">
                                <label for="fullName" class="form-label fw-bold">Full Name</label>
                                <input type="text" class="form-control" id="fullName" placeholder="Enter your full name">
                                <div id="fullNameError" class="error-msg"></div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label fw-bold">Institutional Email Address</label>
                                <input type="text" class="form-control" id="email" placeholder="username@gmail.com">
                                <div id="emailError" class="error-msg"></div>
                            </div>

                            <div class="mb-3">
                                <label for="messageBody" class="form-label fw-bold">Your Message</label>
                                <textarea class="form-control" id="messageBody" rows="4" placeholder="Type your message here..."></textarea>
                                <div id="messageError" class="error-msg"></div>
                            </div>

                            <button type="submit" class="btn btn-danger w-100 fw-bold" style="background-color: var(--roman-crimson, #800020); border-color: var(--roman-gold, #D4AF37);">Submit Message</button>
                        </form>

                        <div id="successMessage"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-4 mt-5">
        <div class="container">
            <p class="mb-0 text-white">&copy; 2026 History of Rome Educational Project. Built with Bootstrap 5.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default page reload behavior

            // Clear any previous runtime messages
            document.getElementById('fullNameError').textContent = '';
            document.getElementById('emailError').textContent = '';
            document.getElementById('messageError').textContent = '';
            document.getElementById('successMessage').textContent = '';
            document.getElementById('successMessage').className = '';

            let isValid = true;

            // 1. Validate Full Name (Letters and spaces only, no numbers, no dots)
            const fullName = document.getElementById('fullName').value.trim();
            const namePattern = /^[a-zA-Z\s]+$/; // Rejects numbers, dots, and special characters

            if (fullName === '') {
                document.getElementById('fullNameError').textContent = 'Full Name field cannot be left empty.';
                isValid = false;
            } else if (!namePattern.test(fullName)) {
                document.getElementById('fullNameError').textContent = 'Full Name can only contain letters and spaces. Numbers, dots, or symbols are not allowed.';
                isValid = false;
            } else if (fullName.length < 3) {
                document.getElementById('fullNameError').textContent = 'Full Name must be at least 3 characters long.';
                isValid = false;
            }

            // 2. Validate Email (Requires @, ONLY allows the specified institutional domains)
            const email = document.getElementById('email').value.trim();
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; 
            const emailDomain = email.split('@')[1] ? email.split('@')[1].toLowerCase() : '';
            
            // STRICT ALLOW LIST: Only these three domains can submit successfully
            const allowedDomains = ['yahoo.com', 'gmail.com', 'outlook.com', 'strathmore.edu'];

            if (email === '') {
                document.getElementById('emailError').textContent = 'Email address cannot be left empty.';
                isValid = false;
            } else if (!email.includes('@')) {
                document.getElementById('emailError').textContent = 'A valid email address requires an "@" symbol.';
                isValid = false;
            } else if (!emailPattern.test(email)) {
                document.getElementById('emailError').textContent = 'Please check your email formatting structure.';
                isValid = false;
            } else if (!allowedDomains.includes(emailDomain)) {
                document.getElementById('emailError').textContent = 'Submission rejected. Please utilize an approved domain (e.g., strathmore.edu). Generic accounts like yahoo.com or outlook.com are banned.';
                isValid = false;
            }

            // 3. Validate Message Body Field (Cannot be empty)
            const messageBody = document.getElementById('messageBody').value.trim();
            if (messageBody === '') {
                document.getElementById('messageError').textContent = 'Message description field cannot be left empty.';
                isValid = false;
            } else if (messageBody.length < 10) {
                document.getElementById('messageError').textContent = 'Please write a clearer message explanation (minimum 10 characters).';
                isValid = false;
            }

            // 4. Output final confirmation message banner
            if (isValid) {
                const successDiv = document.getElementById('successMessage');
                successDiv.textContent = 'Thank you for your feedback! Your message has been safely logged into the Roman archives.';
                successDiv.className = 'success-banner';
                
                // Reset form inputs completely
                document.getElementById('registrationForm').reset();
            }
        });
    </script>
</html>
